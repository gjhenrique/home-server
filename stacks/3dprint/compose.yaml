---
# Bambuddy: print archive, monitoring, virtual printer.
# No host network; add printers manually by IP in the UI.
services:
  bambuddy:
    image: ghcr.io/maziggy/bambuddy:latest
    container_name: bambuddy
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
      - "13000:3000"
      - "8883:8883"
      - "9990:9990"
      - "50000-50100:50000-50100"
    volumes:
      - bambuddy_data:/app/data
      - bambuddy_logs:/app/logs
      - ${EXT_PATH}/3dprinting/virtual_printer:/app/data/virtual_printer
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - PORT=${PORT:-8000}
      - VIRTUAL_PRINTER_PASV_ADDRESS=${VIRTUAL_PRINTER_PASV_ADDRESS:-}
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "${PORT:-8000}"
      prometheus.io/path: "/api/v1/metrics"
      prometheus.io/address: "172.17.0.1:${PORT:-8000}"
      caddy: bambuddy.${DOMAIN}
      caddy.import: sso
      caddy.reverse_proxy: "127.0.0.1:${PORT:-8000}"
      homepage.group: 3D Printing
      homepage.name: Bambuddy
      homepage.icon: https://wiki.bambuddy.cool/assets/logo.png
      homepage.href: https://bambuddy.${DOMAIN}
      homepage.description: Print archive, monitoring, virtual printer

volumes:
  bambuddy_data:
  bambuddy_logs:
